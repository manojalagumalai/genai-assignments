env: staging
baseUri: https://staging.api.example.com
basePath: /v1
port: 443

auth:
  type: bearer
  token: staging-bearer-token-here

timeouts:
  connectionTimeout: 15000
  readTimeout: 20000
  responseTimeThreshold: 5000

headers:
  Content-Type: application/json
  Accept: application/json
  X-Api-Version: "1.0"

database:
  host: staging-db.example.com
  port: 5432
  name: staging_db
